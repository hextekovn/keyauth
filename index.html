<!DOCTYPE html><html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
viewport-fit=cover"><title>
HEXTEKO OS26 Panel
</title><style>

:root{

--bg:#050505;
--card:rgba(18,18,30,.55);

--purple:#8b5cf6;
--purple2:#c084fc;

--border:
rgba(139,92,246,.25);

--text:#f1f1ff;

}

*{

margin:0;
padding:0;

box-sizing:border-box;

font-family:
Inter,
Segoe UI,
sans-serif;

}

body{

background:
radial-gradient(
circle at top left,
#1a1a2e,
#050505
);

color:var(--text);

min-height:100vh;

padding:15px;

}

.hidden{

display:none!important;

}

.glass-panel{

background:
var(--card);

backdrop-filter:
blur(25px);

-webkit-backdrop-filter:
blur(25px);

border:
1px solid
var(--border);

border-radius:
36px;

padding:20px;

box-shadow:
0 0 40px
rgba(139,92,246,.15);

}

.admin-layout{

display:flex;

gap:20px;

}

.sidebar{

width:250px;

background:
rgba(0,0,0,.25);

border:
1px solid
rgba(255,255,255,.05);

border-radius:
28px;

padding:16px;

}

.logo{

font-size:26px;

font-weight:700;

text-align:center;

margin-bottom:15px;

background:
linear-gradient(
135deg,
#c084fc,
#8b5cf6
);

-webkit-background-clip:
text;

-webkit-text-fill-color:
transparent;

}

.nav-btn{

width:100%;

padding:14px;

margin-bottom:8px;

border:none;

cursor:pointer;

border-radius:18px;

background:
rgba(255,255,255,.03);

color:white;

transition:.25s;

}

.nav-btn:hover{

background:
rgba(139,92,246,.25);

transform:
translateX(4px);

}

.main{

flex:1;

background:
rgba(0,0,0,.2);

border-radius:
28px;

padding:20px;

border:
1px solid
rgba(255,255,255,.05);

}

.page{

display:none;

}

.page.active{

display:block;

animation:
fade .25s;

}

@keyframes fade{

from{

opacity:0;
transform:
translateY(10px);

}

to{

opacity:1;
transform:
translateY(0);

}

}

h2{

margin-bottom:15px;

font-size:1.6rem;

background:
linear-gradient(
90deg,
#d8b4fe,
#a78bfa
);

-webkit-background-clip:
text;

-webkit-text-fill-color:
transparent;

}

.input{

width:100%;

padding:14px;

margin:8px 0;

border-radius:18px;

background:
rgba(0,0,0,.4);

border:
1px solid
rgba(139,92,246,.25);

color:white;

outline:none;

}

.input:focus{

border-color:
#8b5cf6;

box-shadow:
0 0 15px
rgba(139,92,246,.4);

}

.btn{

padding:13px 20px;

border:none;

cursor:pointer;

border-radius:18px;

background:
linear-gradient(
135deg,
#8b5cf6,
#c084fc
);

color:white;

font-weight:600;

}

.btn:hover{

opacity:.9;

}

pre{

background:
rgba(0,0,0,.35);

padding:15px;

border-radius:18px;

margin-top:15px;

overflow:auto;

max-height:350px;

}

.stat-grid{

display:grid;

grid-template-columns:
repeat(
auto-fit,
minmax(180px,1fr)
);

gap:15px;

}

.stat-card{

padding:20px;

border-radius:22px;

background:
rgba(255,255,255,.03);

border:
1px solid
rgba(139,92,246,.2);

text-align:center;

}

.login-box{

max-width:420px;

margin:auto;

margin-top:12vh;

padding:30px;

border-radius:32px;

background:
rgba(18,18,30,.6);

backdrop-filter:
blur(24px);

border:
1px solid
rgba(139,92,246,.3);

}

.login-title{

text-align:center;

margin-bottom:20px;

font-size:28px;

}

table{

width:100%;

border-collapse:
collapse;

margin-top:15px;

}

th,td{

padding:12px;

border-bottom:
1px solid
rgba(255,255,255,.08);

text-align:left;

}

.action-btn{

padding:8px 12px;

border:none;

cursor:pointer;

border-radius:12px;

background:
rgba(139,92,246,.2);

color:white;

}

@media(max-width:768px){

.admin-layout{

flex-direction:
column;

}

.sidebar{

width:100%;

}

}

</style></head>
<body>
<!-- LOGIN -->
<div id="login"><div class="login-box"><div class="login-title">🔐 HEXTEKO ADMIN

</div><input
id="adminKey"
class="input"
type="password"
placeholder="Nhập Admin Key">

<button
class="btn"
style="width:100%;margin-top:10px"
onclick="login()">

Đăng nhập

</button></div></div><!-- PANEL --><div
id="panel"
class="hidden"><div class="glass-panel"><div class="admin-layout"><!-- SIDEBAR --><div class="sidebar"><div class="logo">HEXTEKO

</div><button
class="nav-btn"
onclick="showPage('dashboard')">

📊 Dashboard

</button><button
class="nav-btn"
onclick="showPage('createApp')">

➕ Tạo App

</button><button
class="nav-btn"
onclick="showPage('listApps')">

📋 Danh sách App

</button><button
class="nav-btn"
onclick="showPage('createKey')">

🔑 Tạo Key

</button><button
class="nav-btn"
onclick="showPage('listKeys')">

🗂 Danh sách Key

</button><button
class="nav-btn"
onclick="showPage('checkKey')">

🔍 Check Key

</button><button
class="nav-btn"
onclick="showPage('changeAdmin')">

⚙️ Đổi Admin

</button><button
class="nav-btn"
onclick="logout()">

🚪 Logout

</button></div><!-- MAIN --><div class="main"><!-- DASHBOARD --><div
id="dashboard"
class="page active"><h2>Dashboard

</h2><div
id="statsBox"
class="stat-grid"><div class="stat-card">Loading...

</div></div></div><!-- CREATE APP --><div
id="createApp"
class="page"><h2>Tạo App

</h2><input
id="appname"
class="input"
placeholder="Tên App">

<input
id="appdesc"
class="input"
placeholder="Mô tả">

<button
class="btn"
onclick="createApp()">

Tạo App

</button></div><!-- LIST APPS --><div
id="listApps"
class="page"><h2>Danh Sách Apps

</h2><button
class="btn"
onclick="listApps()">

Tải Apps

</button><pre
id="appsOut">

Chưa tải dữ liệu

</pre></div>
<!-- CREATE KEY --><div
id="createKey"
class="page"><h2>Tạo Key

</h2><input
id="keyv"
class="input"
placeholder="Key">

<input
id="owner"
class="input"
placeholder="Owner">

<input
id="expiry"
class="input"
placeholder="30d / forever">

<input
id="appn"
class="input"
placeholder="Tên App">

<button
class="btn"
onclick="generateKey()">

🎲 Generate Key

</button><button
class="btn"
style="margin-left:8px"
onclick="createKey()">

➕ Tạo Key

</button></div><!-- LIST KEYS --><div
id="listKeys"
class="page"><h2>Danh Sách Key

</h2><input
id="searchKey"
class="input"
placeholder="Tìm kiếm key..."
onkeyup="filterKeys()">

<button
class="btn"
onclick="listKeys()">

🔄 Tải Keys

</button><table
id="keysTable"><thead><tr><th>Key</th><th>Owner</th><th>Status</th><th>App</th><th>Action</th></tr></thead><tbody></tbody></table></div><!-- CHECK KEY --><div
id="checkKey"
class="page"><h2>Check Key

</h2><input
id="checkv"
class="input"
placeholder="Nhập key">

<button
class="btn"
onclick="checkKey()">

Kiểm Tra

</button><pre
id="checkOut">

Kết quả...

</pre></div>
<!-- CHANGE ADMIN -->
<div
id="changeAdmin"
class="page"><h2>Đổi Admin Key

</h2><input
id="newAdmin"
class="input"
placeholder="Admin key mới">

<button
class="btn"
onclick="changeAdmin()">

Cập Nhật

</button></div></div></div></div></div>
<script>

const API =
"https://keyauth-udk4.onrender.com";

let ADMIN = "";

let ALL_KEYS = [];

function showPage(id){

document
.querySelectorAll(".page")
.forEach(p=>{

p.classList.remove(
"active"
);

});

document
.getElementById(id)
.classList.add(
"active"
);

}

function switchToPanel(){

document
.getElementById("login")
.classList.add(
"hidden"
);

document
.getElementById("panel")
.classList.remove(
"hidden"
);

showPage(
"dashboard"
);

loadDashboard();

}

async function login(){

const keyInput =
document
.getElementById("adminKey")
.value
.trim();

if(!keyInput){

alert(
"Nhập Admin Key"
);

return;

}

try{

const res =
await fetch(

`${API}/?action=verify_admin&keyadmin=${encodeURIComponent(keyInput)}`

);

const data =
await res.json();

if(!data.success){

alert(
data.message
);

return;

}

ADMIN =
keyInput;

localStorage
.setItem(
"adminKey",
ADMIN
);

switchToPanel();

}catch{

alert(
"Không kết nối được API"
);

}

}

(async()=>{

const saved =

localStorage
.getItem(
"adminKey"
);

if(!saved)
return;

try{

const res =
await fetch(

`${API}/?action=verify_admin&keyadmin=${encodeURIComponent(saved)}`

);

const data =
await res.json();

if(data.success){

ADMIN =
saved;

switchToPanel();

}else{

localStorage
.removeItem(
"adminKey"
);

}

}catch{}

})();

function logout(){

localStorage
.removeItem(
"adminKey"
);

location.reload();

}

async function loadDashboard(){

try{

const appsRes =
await fetch(

`${API}/?action=list_apps&keyadmin=${encodeURIComponent(ADMIN)}`

);

const appsData =
await appsRes.json();

const keysRes =
await fetch(

`${API}/?action=listkey&keyadmin=${encodeURIComponent(ADMIN)}`

);

const keysData =
await keysRes.json();

const totalApps =

appsData.data
? appsData.data.length
: 0;

const totalKeys =

keysData.data
? keysData.data.length
: 0;

document
.getElementById(
"statsBox"
)
.innerHTML = `

<div class="stat-card">

📱 Apps

<br><br>

<b>${totalApps}</b>

</div>

<div class="stat-card">

🔑 Keys

<br><br>

<b>${totalKeys}</b>

</div>

`;

}catch{

document
.getElementById(
"statsBox"
)
.innerHTML =

`<div class="stat-card">
Lỗi tải dữ liệu
</div>`;

}

}

function generateKey(){

const key =

"HEX-" +

Math.random()
.toString(36)
.substring(2,8)
.toUpperCase()

+

"-" +

Date.now()
.toString()
.slice(-4);

document
.getElementById(
"keyv"
)
.value = key;

}
async function createApp(){

const appname =
document
.getElementById(
"appname"
)
.value
.trim();

const appdesc =
document
.getElementById(
"appdesc"
)
.value
.trim();

if(!appname){

alert(
"Nhập tên app"
);

return;

}

const res =
await fetch(

"${API}/?action=create_app&keyadmin=${encodeURIComponent(ADMIN)}&appname=${encodeURIComponent(appname)}&description=${encodeURIComponent(appdesc)}"

);

const data =
await res.json();

alert(
data.message
);

}

async function listApps(){

const res =
await fetch(

"${API}/?action=list_apps&keyadmin=${encodeURIComponent(ADMIN)}"

);

const data =
await res.json();

document
.getElementById(
"appsOut"
)
.textContent =

JSON.stringify(
data,
null,
2
);

}

async function createKey(){

const key =
document
.getElementById(
"keyv"
)
.value
.trim();

const owner =
document
.getElementById(
"owner"
)
.value
.trim();

const expiry =
document
.getElementById(
"expiry"
)
.value
.trim();

const appname =
document
.getElementById(
"appn"
)
.value
.trim();

if(
!key ||
!owner ||
!expiry ||
!appname
){

alert(
"Điền đầy đủ"
);

return;

}

const res =
await fetch(

"${API}/?action=taokey&keyadmin=${encodeURIComponent(ADMIN)}&key=${encodeURIComponent(key)}&owner=${encodeURIComponent(owner)}&expiry=${encodeURIComponent(expiry)}&appname=${encodeURIComponent(appname)}"

);

const data =
await res.json();

alert(
data.message
);

}

async function listKeys(){

const res =
await fetch(

"${API}/?action=listkey&keyadmin=${encodeURIComponent(ADMIN)}"

);

const data =
await res.json();

ALL_KEYS =
data.data || [];

renderKeys(
ALL_KEYS
);

}

function renderKeys(keys){

const tbody =
document.querySelector(
"#keysTable tbody"
);

tbody.innerHTML = "";

keys.forEach(k=>{

tbody.innerHTML += `

<tr><td>${k.key}

</td><td>${k.owner}

</td><td>${k.status}

</td><td>${k.app_name}

</td><td><button
class="action-btn"
onclick="copyKey('${k.key}')">

📋

</button><button
class="action-btn"
onclick="deleteKey('${k.key}')">

🗑

</button></td></tr>`;

});

}

function filterKeys(){

const q =
document
.getElementById(
"searchKey"
)
.value
.toLowerCase();

const result =

ALL_KEYS.filter(
k =>

k.key
.toLowerCase()
.includes(q)

||

k.owner
.toLowerCase()
.includes(q)

||

k.app_name
.toLowerCase()
.includes(q)

);

renderKeys(
result
);

}

function copyKey(key){

navigator
.clipboard
.writeText(key);

alert(
"Đã copy key"
);

}

async function deleteKey(key){

if(
!confirm(
"Xóa key ${key}?"
)
){
return;
}

const res =
await fetch(

"${API}/?action=delete_key&keyadmin=${encodeURIComponent(ADMIN)}&key=${encodeURIComponent(key)}"

);

const data =
await res.json();

alert(
data.message
);

listKeys();

}

async function checkKey(){

const key =
document
.getElementById(
"checkv"
)
.value
.trim();

if(!key){

alert(
"Nhập key"
);

return;

}

const res =
await fetch(

"${API}/checkkey?key=${encodeURIComponent(key)}"

);

const data =
await res.json();

document
.getElementById(
"checkOut"
)
.textContent =

JSON.stringify(
data,
null,
2
);

}

async function changeAdmin(){

const newKey =
document
.getElementById(
"newAdmin"
)
.value
.trim();

if(!newKey){

alert(
"Nhập admin key mới"
);

return;

}

const res =
await fetch(

"${API}/?action=change_admin_key&oldkey=${encodeURIComponent(ADMIN)}&newkey=${encodeURIComponent(newKey)}"

);

const data =
await res.json();

alert(
data.message
);

if(data.success){

ADMIN =
newKey;

localStorage
.setItem(
"adminKey",
newKey
);

}

}

</script></body>
</html>
